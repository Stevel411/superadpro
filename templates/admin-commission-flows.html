<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Commission Flows — Admin — SuperAdPro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#ffffff;--surface:#f8f9fb;--surface2:#f1f3f7;
  --cyan:#0ea5e9;--cyan-light:#e0f2fe;
  --green:#16a34a;--green-light:#dcfce7;
  --purple:#6366f1;--purple-light:#ede9fe;
  --amber:#d97706;--amber-light:#fef3c7;
  --red:#dc2626;--red-light:#fef2f2;
  --text:#132044;--text2:#475569;--muted:#94a3b8;
  --border:#e5e7eb;--navy:#172554;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.16),0 8px 24px rgba(0,0,0,0.12);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);color:var(--text);min-height:100vh}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:224px;height:100vh;background:#172554;border-right:1px solid rgba(0,212,255,0.08);position:fixed;top:0;left:0;z-index:100;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 18px;min-height:72px;border-bottom:1px solid rgba(255,255,255,0.06);text-decoration:none}
.sidebar-brand{font-family:Sora,sans-serif;font-weight:800;font-size:16px;color:#fff}
.sidebar-footer{margin-top:auto;padding:14px 12px;border-top:1px solid rgba(255,255,255,0.06)}
.nav-scroll{flex:1;overflow-y:auto;padding:8px 0}
.nav-divider{height:1px;background:rgba(255,255,255,.06);margin:6px 12px}
.nav-group{margin-bottom:2px}
.nav-header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;font-size:11.5px;font-weight:700;color:#0ea5e9;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;user-select:none}
.nav-chevron{font-size:14px;color:rgba(255,255,255,.3)}
.nav-group.open .nav-chevron{transform:rotate(90deg)}
.nav-children{display:none;padding-bottom:4px}
.nav-group.open .nav-children{display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px 9px 22px;font-size:13px;color:rgba(200,220,255,.55);text-decoration:none;font-weight:500}
.nav-item:hover{background:rgba(14,165,233,.06);color:rgba(200,220,255,.85)}
.nav-item.active{color:#38bdf8;font-weight:700;background:rgba(14,165,233,.08)}
.nav-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.nav-standalone{padding:10px 18px}

.main{margin-left:224px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* Topbar */
.topbar{height:72px;background:var(--navy);border-bottom:1px solid rgba(14,165,233,0.12);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-icon{width:36px;height:36px;border-radius:10px;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.2);display:flex;align-items:center;justify-content:center}
.tb-title{font-size:17px;font-weight:800;color:#fff}
.tb-sub{font-size:12px;color:rgba(0,212,255,0.45);margin-top:1px}
.tb-link{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;color:rgba(200,220,255,0.55);text-decoration:none;border:1px solid rgba(255,255,255,0.08)}
.tb-link:hover{background:rgba(255,255,255,0.05);color:#fff}

.content{padding:24px 28px;flex:1}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:24px}
.tab{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);transition:all 0.15s}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab:hover:not(.active){background:var(--surface)}

/* Panel */
.panel{display:none}.panel.active{display:block}

/* ── Network Tree ── */
.tree-container{position:relative}
.tree-node{display:inline-flex;flex-direction:column;align-items:center;margin:0 8px;vertical-align:top}
.tree-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 16px;box-shadow:var(--shadow-sm);min-width:160px;cursor:pointer;transition:all 0.15s;position:relative}
.tree-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.22);transform:translateY(-2px)}
.tree-card.admin-card{border-color:var(--cyan);background:var(--cyan-light)}
.tree-card.inactive{opacity:0.5;border-style:dashed}
.tc-name{font-size:13px;font-weight:700;color:var(--text)}
.tc-id{font-size:10px;color:var(--muted)}
.tc-stats{display:flex;gap:8px;margin-top:6px;font-size:10px}
.tc-tag{padding:2px 6px;border-radius:4px;font-weight:700}
.tc-tag.earned{background:var(--green-light);color:var(--green)}
.tc-tag.sales{background:var(--cyan-light);color:var(--cyan)}
.tc-tiers{display:flex;gap:3px;margin-top:4px}
.tc-tier{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff}
.tc-tier.t1{background:var(--cyan)}.tc-tier.t2{background:var(--purple)}.tc-tier.t3{background:var(--amber)}.tc-tier.none{background:var(--border);color:var(--muted)}
.tc-passup{font-size:9px;color:var(--purple);margin-top:3px;font-weight:600}
.tree-children{display:flex;justify-content:center;margin-top:8px;position:relative}
.tree-line{width:1px;height:16px;background:var(--border);margin:0 auto}

/* ── Commission Log ── */
.flow-table{width:100%;border-collapse:collapse}
.flow-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);background:var(--surface)}
.flow-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border)}
.flow-table tr:hover{background:var(--surface)}
.ft-type{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;display:inline-block}
.ft-direct{background:var(--green-light);color:var(--green)}
.ft-passup{background:var(--cyan-light);color:var(--cyan)}
.ft-platform{background:var(--red-light);color:var(--red)}
.ft-amount{font-family:Sora,sans-serif;font-weight:800}
.ft-tier{width:22px;height:22px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.ft-tier.t1{background:var(--cyan)}.ft-tier.t2{background:var(--purple)}.ft-tier.t3{background:var(--amber)}
.ft-notes{font-size:11px;color:var(--muted);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* Stats bar */
.stats-bar{display:flex;gap:16px;margin-bottom:20px}
.stat-chip{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 20px;box-shadow:var(--shadow-sm);flex:1;text-align:center}
.stat-chip-val{font-family:Sora,sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.stat-chip-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

@media(max-width:768px){.sidebar{display:none!important}.main{margin-left:0!important}.content{padding:16px}.stats-bar{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="layout">
{% include "_sidebar.html" %}
<div class="main">

<div class="topbar">
  <div class="tb-left">
    <div class="tb-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <div>
      <div class="tb-title">Commission Flow Dashboard</div>
      <div class="tb-sub">Network tree · Commission log · Real-time verification</div>
    </div>
  </div>
  <div>
    <a class="tb-link" href="/admin">← Back to Admin</a>
  </div>
</div>

<div class="content">

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip"><div class="stat-chip-val" id="statTotal">—</div><div class="stat-chip-lbl">Total Commissions</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="statDirect">—</div><div class="stat-chip-lbl">Direct Sales</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="statPassup">—</div><div class="stat-chip-lbl">Pass-Ups</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="statPlatform">—</div><div class="stat-chip-lbl">To Company</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="statVolume">—</div><div class="stat-chip-lbl">Total Volume</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showPanel('tree')">Network Tree</div>
    <div class="tab" onclick="showPanel('log')">Commission Log</div>
  </div>

  <!-- Panel 1: Network Tree -->
  <div class="panel active" id="panelTree">
    <div class="loading" id="treeLoading">Loading network tree...</div>
    <div id="treeContainer" style="overflow-x:auto;padding:20px 0"></div>
  </div>

  <!-- Panel 2: Commission Log -->
  <div class="panel" id="panelLog">
    <div class="loading" id="logLoading">Loading commission log...</div>
    <div id="logContainer" style="overflow-x:auto"></div>
  </div>

</div>
</div>
</div>

<script>
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  event.target.classList.add('active');
}

// ── Load Commission Log ──
async function loadFlows() {
  try {
    const r = await fetch('/admin/api/commission-flows?limit=200');
    const d = await r.json();
    const flows = d.flows || [];

    // Stats
    let direct = 0, passup = 0, platform = 0, volume = 0;
    flows.forEach(f => {
      volume += f.amount;
      if (f.type === 'direct_sale') direct++;
      else if (f.type === 'pass_up') passup++;
      else if (f.type === 'platform') platform++;
    });
    document.getElementById('statTotal').textContent = flows.length;
    document.getElementById('statDirect').textContent = direct;
    document.getElementById('statPassup').textContent = passup;
    document.getElementById('statPlatform').textContent = platform;
    document.getElementById('statVolume').textContent = '$' + volume.toFixed(0);

    if (flows.length === 0) {
      document.getElementById('logContainer').innerHTML = '<div class="loading">No course commissions yet. Purchase a course to see flows.</div>';
      document.getElementById('logLoading').style.display = 'none';
      return;
    }

    let html = '<table class="flow-table"><thead><tr><th>#</th><th>Buyer</th><th>Earner</th><th>Amount</th><th>Tier</th><th>Type</th><th>Details</th></tr></thead><tbody>';
    flows.forEach(f => {
      const typeClass = f.type === 'direct_sale' ? 'ft-direct' : f.type === 'pass_up' ? 'ft-passup' : 'ft-platform';
      const typeLabel = f.type === 'direct_sale' ? 'DIRECT' : f.type === 'pass_up' ? 'PASS-UP' : 'COMPANY';
      html += '<tr>' +
        '<td style="color:var(--muted);font-size:11px">' + f.id + '</td>' +
        '<td><strong>' + f.buyer + '</strong></td>' +
        '<td><strong style="color:' + (f.type==='platform'?'var(--red)':'var(--green)') + '">' + f.earner + '</strong></td>' +
        '<td class="ft-amount" style="color:' + (f.type==='platform'?'var(--red)':'var(--green)') + '">$' + f.amount + '</td>' +
        '<td><span class="ft-tier t' + f.tier + '">' + f.tier + '</span></td>' +
        '<td><span class="ft-type ' + typeClass + '">' + typeLabel + '</span></td>' +
        '<td class="ft-notes" title="' + f.notes.replace(/"/g,'&quot;') + '">' + f.notes + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('logContainer').innerHTML = html;
    document.getElementById('logLoading').style.display = 'none';
  } catch(e) { console.error(e); }
}

// ── Load Network Tree ──
async function loadTree() {
  try {
    const r = await fetch('/admin/api/network-tree');
    const d = await r.json();
    const nodes = d.nodes || [];
    const root_id = d.root_id;

    if (nodes.length === 0) {
      document.getElementById('treeContainer').innerHTML = '<div class="loading">No users in network.</div>';
      document.getElementById('treeLoading').style.display = 'none';
      return;
    }

    // Build lookup
    const byId = {};
    const children = {};
    nodes.forEach(n => {
      byId[n.id] = n;
      if (!children[n.sponsor_id]) children[n.sponsor_id] = [];
      if (n.sponsor_id) children[n.sponsor_id].push(n);
    });

    function renderNode(node, depth) {
      if (depth > 5) return '';  // Max depth for display
      const kids = children[node.id] || [];
      const isAdmin = node.is_admin;
      const passupName = node.pass_up_sponsor_id && byId[node.pass_up_sponsor_id] ? byId[node.pass_up_sponsor_id].username : '';

      let tiersHtml = '';
      [1,2,3].forEach(t => {
        if (node.owned_tiers.includes(t)) {
          tiersHtml += '<div class="tc-tier t' + t + '">' + t + '</div>';
        } else {
          tiersHtml += '<div class="tc-tier none">✕</div>';
        }
      });

      let html = '<div class="tree-node">';
      html += '<div class="tree-card' + (isAdmin ? ' admin-card' : '') + (!node.is_active ? ' inactive' : '') + '">';
      html += '<div class="tc-name">' + node.username + (isAdmin ? ' 👑' : '') + '</div>';
      html += '<div class="tc-id">ID: ' + node.id + (node.sponsor_id ? ' · Sponsor: ' + (byId[node.sponsor_id]?.username || node.sponsor_id) : ' · ROOT') + '</div>';
      html += '<div class="tc-stats">';
      html += '<span class="tc-tag earned">$' + node.course_earnings + '</span>';
      html += '<span class="tc-tag sales">' + node.sale_count + ' sales</span>';
      html += '</div>';
      html += '<div class="tc-tiers">' + tiersHtml + '</div>';
      if (passupName) html += '<div class="tc-passup">↑ Pass-up: ' + passupName + '</div>';
      html += '</div>';

      if (kids.length > 0) {
        html += '<div class="tree-line"></div>';
        html += '<div class="tree-children">';
        kids.forEach(k => { html += renderNode(k, depth + 1); });
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    // Find root
    let root = byId[root_id];
    if (!root) root = nodes.find(n => !n.sponsor_id) || nodes[0];

    const treeHtml = renderNode(root, 0);
    document.getElementById('treeContainer').innerHTML = treeHtml;
    document.getElementById('treeLoading').style.display = 'none';
  } catch(e) { console.error(e); document.getElementById('treeLoading').textContent = 'Error loading tree'; }
}

// Load both on page ready
loadFlows();
loadTree();
</script>
</body>
</html>
