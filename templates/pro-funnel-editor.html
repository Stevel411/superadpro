<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
<script src="https://unpkg.com/grapesjs"></script>
<script src="https://unpkg.com/grapesjs-blocks-basic"></script>
<script src="https://unpkg.com/grapesjs-preset-webpage"></script>
<script src="https://unpkg.com/grapesjs-plugin-forms"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sp-shell:#0a0e1a;--sp-shell2:#111627;--sp-panel:#131830;--sp-border:rgba(255,255,255,0.06);--sp-border2:rgba(255,255,255,0.1);--sp-accent:#0ea5e9;--sp-accent2:#6366f1;--sp-green:#10b981;--sp-rose:#f43f5e;--sp-amber:#f59e0b;--sp-text:#e8eaf0;--sp-text2:#8b92a8;--sp-text3:#565e78}
body{margin:0;background:var(--sp-shell);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden;height:100vh;color:var(--sp-text)}
::selection{background:#0ea5e940}
.sp-topbar{height:54px;background:var(--sp-shell2);border-bottom:1px solid var(--sp-border);display:flex;align-items:center;padding:0 16px;gap:8px;z-index:100;flex-shrink:0}
.sp-brand{display:flex;align-items:center;gap:10px;padding-right:12px;border-right:1px solid var(--sp-border);margin-right:4px;text-decoration:none}
.sp-brand-text{font-family:Sora,sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.3px}
.sp-brand-text span{color:var(--sp-accent)}
.sp-title{font-size:13px;color:var(--sp-text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-title strong{color:var(--sp-text);font-weight:600}
.sp-dirty{width:7px;height:7px;border-radius:50%;background:var(--sp-amber);display:none;flex-shrink:0}
.sp-dirty.show{display:block}
.sp-sep{width:1px;height:26px;background:var(--sp-border);margin:0 4px}
.sp-tbtn{padding:6px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.sp-tghost{background:rgba(255,255,255,.04);color:var(--sp-text3);border:1px solid var(--sp-border)}
.sp-tghost:hover{background:rgba(255,255,255,.08);color:var(--sp-text)}
.sp-tsave{background:var(--sp-green);color:#fff;border:none}.sp-tsave:hover{background:#059669}
.sp-tundo{padding:5px 10px;border:none;border-radius:7px;font-size:15px;cursor:pointer;background:rgba(255,255,255,.04);color:var(--sp-text3);transition:.12s;line-height:1}
.sp-tundo:hover{background:rgba(255,255,255,.08);color:#fff}
.sp-pub{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:1px solid var(--sp-border);background:rgba(255,255,255,.03);cursor:pointer;font-size:11px;font-weight:700;color:var(--sp-text3);transition:.15s}
.sp-pub.live{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:var(--sp-green)}
.sp-pubdot{width:7px;height:7px;border-radius:50%;background:var(--sp-text3);transition:.2s}
.sp-pub.live .sp-pubdot{background:var(--sp-green);box-shadow:0 0 8px rgba(16,185,129,.5)}
.sp-open{padding:5px 12px;border:none;border-radius:7px;font-size:11px;font-weight:700;text-decoration:none;color:var(--sp-green);background:rgba(16,185,129,.08);display:none;align-items:center;gap:3px}
.sp-open.show{display:inline-flex}
.sp-layout{display:flex;height:calc(100vh - 54px)}
.sp-panel{width:280px;background:var(--sp-panel);border-left:1px solid var(--sp-border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;z-index:10}
.sp-panel-head{padding:14px 16px;border-bottom:1px solid var(--sp-border);display:flex;align-items:center;justify-content:space-between}
.sp-panel-head h3{font-family:Sora,sans-serif;font-size:13px;font-weight:800;color:var(--sp-text);display:flex;align-items:center;gap:6px}
.sp-panel-head p{font-size:10px;color:var(--sp-text3);margin-top:2px}
.sp-bg-sw{width:28px;height:28px;border-radius:8px;border:2px solid var(--sp-border2);overflow:hidden;position:relative;cursor:pointer}
.sp-bg-sw:hover{border-color:var(--sp-accent)}
.sp-bg-sw input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);border:none;cursor:pointer;padding:0}
.sp-blocks{flex:1;overflow-y:auto;padding:10px}
.sp-blocks::-webkit-scrollbar{width:3px}.sp-blocks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.sp-bcat{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:8px 2px 5px}
.sp-bcat:first-child{padding-top:2px}
.sp-bcat-text{color:var(--sp-accent)}.sp-bcat-media{color:#8b5cf6}.sp-bcat-actions{color:var(--sp-green)}.sp-bcat-content{color:var(--sp-amber)}.sp-bcat-layout{color:#ec4899}
.sp-bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.sp-bitem{background:linear-gradient(160deg,rgba(46,56,98,.55),rgba(35,41,82,.55),rgba(29,35,69,.55));border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 4px 10px;text-align:center;cursor:grab;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s;user-select:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.07);position:relative;overflow:hidden}
.sp-bitem::before{content:'';position:absolute;top:-40%;left:-40%;width:180%;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-radius:50%;pointer-events:none}
.sp-bitem:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(14,165,233,.18),0 0 0 1px rgba(14,165,233,.3),inset 0 1px 0 rgba(255,255,255,.1);border-color:rgba(14,165,233,.3)}
.sp-bitem:active{transform:scale(.94)}
.sp-bico{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.sp-bico svg{width:22px;height:22px;stroke-width:1.8;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.sp-bname{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:rgba(255,255,255,.4)}
#gjsEditor{flex:1;border:none;position:relative;overflow:hidden;border-left:1px solid rgba(255,255,255,0.06)}
.gjs-editor{background:var(--sp-shell)!important;height:100%!important}
.gjs-cv-canvas{background:#161b2e!important;width:100%!important;height:100%!important}
.gjs-pn-panels{display:none!important}
.gjs-pn-views,.gjs-pn-views-container{display:none!important}
.gjs-frame-wrapper{background:transparent!important}
.gjs-frame{background:transparent!important;border:none!important;width:calc(100% - 48px)!important;height:calc(100% - 40px)!important;top:20px!important;left:24px!important;right:24px!important;bottom:20px!important;box-shadow:0 4px 40px rgba(0,0,0,.4)!important;border-radius:6px!important}
.gjs-rte-toolbar{display:none!important}
.gjs-editor ::-webkit-scrollbar{width:4px;height:4px}
.gjs-editor ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
#floatBar{display:none;position:fixed;z-index:200;background:var(--sp-shell2);border:1px solid var(--sp-border2);border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);padding:6px 8px;gap:4px;align-items:center;flex-wrap:wrap;max-width:720px}
#floatBar.show{display:flex}
#floatBar select,#floatBar input[type=number]{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--sp-text);padding:5px 6px;font-size:11px;font-family:inherit;outline:none}
#floatBar select:focus,#floatBar input:focus{border-color:var(--sp-accent)}
#floatBar select{max-width:140px}
#floatBar input[type=number]{width:48px;text-align:center}
.fb-sep{width:1px;height:22px;background:rgba(255,255,255,.08);margin:0 2px;flex-shrink:0}
.fb-btn{width:30px;height:30px;border:none;border-radius:6px;background:transparent;color:var(--sp-text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;flex-shrink:0}
.fb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.fb-color{width:28px;height:28px;border-radius:6px;border:2px solid rgba(255,255,255,.12);overflow:hidden;position:relative;cursor:pointer;flex-shrink:0}
.fb-color:hover{border-color:var(--sp-accent)}
.fb-color input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);border:none;cursor:pointer;padding:0}
.sp-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sp-shell2);color:#fff;padding:10px 24px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--sp-border);transition:all .3s;pointer-events:none}
.sp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="sp-topbar">
  <a href="/pro/funnels" class="sp-brand"><svg width="28" height="28" viewBox="0 0 48 48"><rect x="6" y="6" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".9"/><rect x="26" y="6" width="16" height="16" rx="4" fill="#6366f1" opacity=".7"/><rect x="6" y="26" width="16" height="16" rx="4" fill="#6366f1" opacity=".5"/><rect x="26" y="26" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".3"/><path d="M18 14l-4 4m0-4l4 4" stroke="#fff" stroke-width="2" stroke-linecap="round"/><rect x="30" y="11" width="8" height="2" rx="1" fill="#fff" opacity=".8"/><rect x="30" y="15" width="5" height="2" rx="1" fill="#fff" opacity=".5"/></svg><div class="sp-brand-text">Super<span>Pages</span></div></a>
  <div class="sp-title"><strong>{{ page.headline or page.title }}</strong></div>
  <div class="sp-dirty" id="dirtyDot"></div>
  <div class="sp-sep"></div>
  <button class="sp-tundo" onclick="editor.UndoManager.undo()" title="Undo">&#x21a9;</button>
  <button class="sp-tundo" onclick="editor.UndoManager.redo()" title="Redo">&#x21aa;</button>
  <div class="sp-sep"></div>
  <button class="sp-tbtn sp-tghost" onclick="editor.runCommand('core:preview')">Preview</button>
  <div class="sp-sep"></div>
  <button class="sp-tbtn sp-tsave" onclick="editorSave()">Save</button>
  <div class="sp-pub" id="pubToggle" onclick="togglePub()"><div class="sp-pubdot"></div><span id="pubLabel">Draft</span></div>
  <a href="/f/{{ page.slug }}" target="_blank" class="sp-open" id="openLink">Open &#x2197;</a>
</div>
<div id="floatBar">
  <select id="fbFont" onchange="fbStyle('font-family',this.value)" title="Font"></select>
  <input type="number" id="fbSize" min="8" max="120" value="16" onchange="fbStyle('font-size',this.value+'px')" title="Size">
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="fbExec('bold')" title="Bold"><b>B</b></button>
  <button class="fb-btn" onclick="fbExec('italic')" title="Italic"><i>I</i></button>
  <button class="fb-btn" onclick="fbExec('underline')" title="Underline"><u>U</u></button>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="fbStyle('text-align','left')" title="Left">&#x2261;</button>
  <button class="fb-btn" onclick="fbStyle('text-align','center')" title="Center">&#x2550;</button>
  <button class="fb-btn" onclick="fbStyle('text-align','right')" title="Right">&#x2262;</button>
  <div class="fb-sep"></div>
  <div class="fb-color" title="Text Colour"><input type="color" id="fbTextColor" value="#ffffff" oninput="fbStyle('color',this.value)"></div>
  <div class="fb-color" title="Background"><input type="color" id="fbBgColor" value="#000000" oninput="fbStyle('background-color',this.value)"></div>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="fbDuplicate()" title="Duplicate">&#x2750;</button>
  <button class="fb-btn" onclick="fbDelete()" title="Delete" style="color:var(--sp-rose)">&#x2715;</button>
</div>
<div class="sp-layout">
  <div id="gjsEditor"></div>
  <div class="sp-panel">
    <div class="sp-panel-head"><div><h3><svg width="16" height="16" viewBox="0 0 48 48"><rect x="6" y="6" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".9"/><rect x="26" y="6" width="16" height="16" rx="4" fill="#6366f1" opacity=".7"/><rect x="6" y="26" width="16" height="16" rx="4" fill="#6366f1" opacity=".5"/><rect x="26" y="26" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".3"/></svg> Blocks</h3><p>Click or drag to canvas</p></div><div class="sp-panel-head-r"><div class="sp-bg-sw" id="bgSwatch"><input type="color" id="bgPicker" value="#050d1a" oninput="setCanvasBg(this.value)"></div></div></div>
    <div class="sp-blocks">
      <div class="sp-bcat sp-bcat-text">Text</div><div class="sp-bgrid">
        <div class="sp-bitem" data-block="sa-heading"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16"/><path d="M20 4v16"/><path d="M4 12h16"/></svg></span><span class="sp-bname">Heading</span></div>
        <div class="sp-bitem" data-block="sa-text"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h10"/></svg></span><span class="sp-bname">Text</span></div>
        <div class="sp-bitem" data-block="sa-label"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M7 10h10"/></svg></span><span class="sp-bname">Label</span></div></div>
      <div class="sp-bcat sp-bcat-media">Media</div><div class="sp-bgrid">
        <div class="sp-bitem" data-block="image"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg></span><span class="sp-bname">Image</span></div>
        <div class="sp-bitem" data-block="video"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg></span><span class="sp-bname">Video</span></div>
        <div class="sp-bitem" data-block="map"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span><span class="sp-bname">Audio</span></div></div>
      <div class="sp-bcat sp-bcat-actions">Actions</div><div class="sp-bgrid">
        <div class="sp-bitem" data-block="sa-cta-button"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="10" rx="5"/><path d="M8 12h8"/></svg></span><span class="sp-bname">Button</span></div>
        <div class="sp-bitem" data-block="sa-optin"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 8h10M7 12h10M9 16h6"/></svg></span><span class="sp-bname">Opt-In</span></div>
        <div class="sp-bitem" data-block="link"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/></svg></span><span class="sp-bname">Link</span></div></div>
      <div class="sp-bcat sp-bcat-content">Content</div><div class="sp-bgrid">
        <div class="sp-bitem" data-block="sa-testimonial"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg></span><span class="sp-bname">Review</span></div>
        <div class="sp-bitem" data-block="sa-stat"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="14" width="4" height="7" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="16" y="4" width="4" height="17" rx="1"/></svg></span><span class="sp-bname">Stat</span></div>
        <div class="sp-bitem" data-block="sa-features"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span><span class="sp-bname">Features</span></div></div>
      <div class="sp-bcat sp-bcat-layout">Layout</div><div class="sp-bgrid">
        <div class="sp-bitem" data-block="column1"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></span><span class="sp-bname">1 Col</span></div>
        <div class="sp-bitem" data-block="column2"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="18" rx="2"/><rect x="13" y="3" width="8" height="18" rx="2"/></svg></span><span class="sp-bname">2 Col</span></div>
        <div class="sp-bitem" data-block="column3"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="3" width="6" height="18" rx="1"/><rect x="16" y="3" width="6" height="18" rx="1"/></svg></span><span class="sp-bname">3 Col</span></div></div>
      <div class="sp-bgrid" style="margin-top:4px">
        <div class="sp-bitem" data-block="sa-hero"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 12h8M10 8h4"/></svg></span><span class="sp-bname">Hero</span></div>
        <div class="sp-bitem" data-block="sa-divider"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round"><path d="M3 12h18"/></svg></span><span class="sp-bname">Divider</span></div>
        <div class="sp-bitem" data-block="sa-spacer"><span class="sp-bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span><span class="sp-bname">Spacer</span></div></div>
    </div>
  </div>
</div>
<div class="sp-toast" id="spToast"></div>
<script>
const PAGE_ID={{page.id}},SLUG='{{page.slug}}';
let _pub='{{page.status or "draft"}}',_dirty=false;
if(_pub==='published'){document.getElementById('pubToggle').classList.add('live');document.getElementById('pubLabel').textContent='Live';document.getElementById('openLink').classList.add('show')}

var floatBar=document.getElementById('floatBar');
function showFloatBar(comp){if(!comp){floatBar.classList.remove('show');return}floatBar.classList.add('show');var s=comp.getStyle();var ff=s['font-family']||'';if(ff)fbFontEl.value=ff.replace(/['"]/g,'').split(',')[0].trim();document.getElementById('fbSize').value=parseInt(s['font-size'])||16;document.getElementById('fbTextColor').value=rgbHex(s['color']||'#ffffff');document.getElementById('fbBgColor').value=rgbHex(s['background-color']||s['background']||'#000000');posBar(comp)}
function posBar(comp){if(!comp)return;var el=comp.getEl();if(!el)return;var cv=editor.Canvas;var r=cv.getElementPos(el);var o=cv.getOffset();var x=o.left+r.left;var y=o.top+r.top-50;if(y<60)y=o.top+r.top+r.height+8;floatBar.style.left=Math.max(10,Math.min(x,window.innerWidth-740))+'px';floatBar.style.top=Math.max(60,y)+'px'}
function rgbHex(c){if(!c)return'#000000';if(c.charAt(0)==='#')return c.length>7?c.slice(0,7):c;var m=c.match(/\d+/g);if(!m||m.length<3)return'#000000';return'#'+((1<<24)+(+m[0]<<16)+(+m[1]<<8)+ +m[2]).toString(16).slice(1)}
function fbStyle(p,v){var c=editor.getSelected();if(!c)return;c.addStyle({[p]:v});_dirty=true;document.getElementById('dirtyDot').classList.add('show')}
function fbExec(cmd){var f=editor.Canvas.getFrameEl();if(f&&f.contentDocument)f.contentDocument.execCommand(cmd,false,null);_dirty=true;document.getElementById('dirtyDot').classList.add('show')}
function fbDuplicate(){var c=editor.getSelected();if(!c)return;var p=c.parent();if(p){var cl=c.clone();p.append(cl,{at:c.index()+1});editor.select(cl)}}
function fbDelete(){var c=editor.getSelected();if(c)c.remove();floatBar.classList.remove('show')}

async function editorSave(){var components=JSON.stringify(editor.getComponents());var styles=JSON.stringify(editor.getStyle());var html=editor.getHtml();var css=editor.getCss();var payload={id:PAGE_ID,title:'{{page.title|e}}',headline:'{{page.headline or page.title|e}}',gjs_components:components,gjs_styles:styles,gjs_html:'<style>'+css+'</style>'+html,gjs_css:JSON.stringify({v:'grapes',components:components,styles:styles}),status:_pub};try{var r=await fetch('/api/funnels/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});var d=await r.json();if(d.success||d.id){_dirty=false;document.getElementById('dirtyDot').classList.remove('show');spToast('Saved!');if(d.slug)document.getElementById('openLink').href='/f/'+d.slug}else spToast('Error: '+(d.error||''))}catch(e){spToast('Save error')}}
(function loadPage(){try{var raw={{(page.gjs_css or '')|tojson|safe}};if(raw&&raw.trim()){var p=JSON.parse(raw);if(p.v==='grapes'&&p.components){editor.setComponents(JSON.parse(p.components));if(p.styles)editor.setStyle(JSON.parse(p.styles));return}if(p.objects){var h='<div style="max-width:1100px;margin:0 auto;padding:40px 20px;min-height:600px">';(p.objects||[]).forEach(function(o){if(o.type==='textbox'){h+='<div style="font-family:'+(o.fontFamily||'Outfit')+';font-size:'+(o.fontSize||16)+'px;font-weight:'+(o.fontWeight||400)+';color:'+(o.fill||'#e2e8f0')+';text-align:'+(o.textAlign||'left')+';line-height:'+(o.lineHeight||1.4)+';margin-bottom:20px">'+(o.text||'').replace(/\n/g,'<br>')+'</div>'}});h+='</div>';editor.setComponents(h);return}if(p.els&&Array.isArray(p.els)){var h2='<div style="max-width:1100px;margin:0 auto;padding:40px 20px;min-height:600px;background:'+(p.canvasBg||'#050d1a')+'">';p.els.forEach(function(el){var s=el.s||{};if(['heading','text','label','button','cta','testimonial','stat','faq','form','review','badge','icontext','logostrip','separator'].indexOf(el.type)>=0){h2+='<div style="font-family:'+((s.fontFamily||'Outfit').split(',')[0])+';font-size:'+(s.fontSize||'16px')+';font-weight:'+(s.fontWeight||'400')+';color:'+(s.color||'#e2e8f0')+';text-align:'+(s.textAlign||'left')+';line-height:'+(s.lineHeight||'1.4')+';'+(s.background?'background:'+s.background+';':'')+';margin-bottom:20px">'+(el.txt||'')+'</div>'}else if(el.type==='divider'){h2+='<hr style="border:none;border-top:2px solid '+(s.background||'#334155')+';margin:20px 0">'}});h2+='</div>';editor.setComponents(h2);return}}var savedHtml={{(page.gjs_html or '')|tojson|safe}};if(savedHtml&&savedHtml.trim()){editor.setComponents(savedHtml);return}}catch(e){console.error('Load:',e)}editor.setComponents('<div style="position:relative;min-height:100vh;padding:40px"><h1 style="font-family:Sora,sans-serif;font-weight:900;font-size:42px;color:#fff;text-align:center;padding:20px 40px">Start Building Your Page</h1><p style="font-family:Outfit,sans-serif;font-size:16px;color:#94a3b8;max-width:500px;line-height:1.7;text-align:center;margin:0 auto">Drag blocks from the right panel. Double-click text to edit.</p></div>')})();
function togglePub(){_pub=_pub==='published'?'draft':'published';var tg=document.getElementById('pubToggle'),lb=document.getElementById('pubLabel'),lk=document.getElementById('openLink');if(_pub==='published'){tg.classList.add('live');lb.textContent='Live';lk.classList.add('show');spToast('Published!')}else{tg.classList.remove('live');lb.textContent='Draft';lk.classList.remove('show');spToast('Unpublished')}_dirty=true;editorSave()}
