<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SuperPages — SuperAdPro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&family=Raleway:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600;700;800&family=Lato:wght@400;700;900&family=Roboto:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&family=Anton&family=Bebas+Neue&family=Dancing+Script:wght@400;500;600;700&family=Pacifico&family=Caveat:wght@400;500;600;700&family=Josefin+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Permanent+Marker&family=Bangers&family=Satisfy&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sp:#0a0e1a;--sp2:#111627;--sp3:#131830;--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);--ac:#0ea5e9;--ac2:#6366f1;--gn:#10b981;--rs:#f43f5e;--am:#f59e0b;--tx:#e8eaf0;--tx2:#8b92a8;--tx3:#565e78}
body{margin:0;background:var(--sp);font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;color:var(--tx)}

/* ═══ TOPBAR ═══ */
.tb{height:54px;background:var(--sp2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:8px;z-index:100}
.tb-brand{display:flex;align-items:center;gap:10px;padding-right:12px;border-right:1px solid var(--bd);margin-right:4px;text-decoration:none}
.tb-brand-t{font-family:Sora,sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.3px}
.tb-brand-t span{color:var(--ac)}
.tb-title{font-size:13px;color:var(--tx3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-title strong{color:var(--tx);font-weight:600}
.tb-dirty{width:7px;height:7px;border-radius:50%;background:var(--am);display:none;flex-shrink:0}
.tb-dirty.on{display:block}
.tb-sep{width:1px;height:26px;background:var(--bd);margin:0 4px}
.tb-btn{padding:6px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.tb-ghost{background:rgba(255,255,255,.04);color:var(--tx3);border:1px solid var(--bd)}
.tb-ghost:hover{background:rgba(255,255,255,.08);color:var(--tx)}
.tb-save{background:var(--gn);color:#fff;border:none}.tb-save:hover{background:#059669}
.tb-pub{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,.03);cursor:pointer;font-size:11px;font-weight:700;color:var(--tx3)}
.tb-pub.live{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:var(--gn)}
.tb-pubdot{width:7px;height:7px;border-radius:50%;background:var(--tx3)}
.tb-pub.live .tb-pubdot{background:var(--gn);box-shadow:0 0 8px rgba(16,185,129,.5)}
.tb-open{padding:5px 12px;border:none;border-radius:7px;font-size:11px;font-weight:700;text-decoration:none;color:var(--gn);background:rgba(16,185,129,.08);display:none;align-items:center;gap:3px}
.tb-open.on{display:inline-flex}
.tb-undo{padding:5px 10px;border:none;border-radius:7px;font-size:15px;cursor:pointer;background:rgba(255,255,255,.04);color:var(--tx3);line-height:1}
.tb-undo:hover{background:rgba(255,255,255,.08);color:#fff}

/* ═══ LAYOUT ═══ */
.layout{display:flex;height:calc(100vh - 54px);background:#0d1117}

/* ═══ CANVAS AREA ═══ */
.canvas-wrap{flex:1;overflow:auto;margin:12px;margin-right:0;border-radius:8px;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.04)}
.canvas{position:relative;width:100%;min-height:2000px;background:#050d1a;overflow:hidden}

/* ═══ ELEMENTS ON CANVAS ═══ */
.sp-el{position:absolute;cursor:grab;min-width:40px;min-height:20px;outline:2px solid transparent;outline-offset:2px;transition:outline .15s}
.sp-el:hover{outline:2px solid rgba(14,165,233,.3)}
.sp-el.selected{outline:2px solid var(--ac);cursor:move}
.sp-el.editing{cursor:text;outline:2px solid var(--ac2)}
/* Resize handles */
.sp-el.selected::after{content:'';position:absolute;right:-4px;bottom:-4px;width:8px;height:8px;background:var(--sp2);border:2px solid var(--ac);border-radius:2px;cursor:se-resize;z-index:5}
.sp-el.selected::before{content:'';position:absolute;right:-4px;top:-4px;width:8px;height:8px;background:var(--sp2);border:2px solid var(--ac);border-radius:2px;cursor:ne-resize;z-index:5}

/* ═══ FLOATING TOOLBAR ═══ */
#ftb{display:none;position:fixed;z-index:200;background:var(--sp2);border:1px solid var(--bd2);border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,.5);padding:6px 8px;gap:5px;align-items:center;flex-wrap:wrap;max-width:740px}
#ftb.on{display:flex}
#ftb select,#ftb input[type=number]{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--tx);padding:5px 6px;font-size:11px;font-family:inherit;outline:none}
#ftb select:focus,#ftb input:focus{border-color:var(--ac)}
#ftb select{max-width:140px}
#ftb input[type=number]{width:48px;text-align:center}
.ft-sep{width:1px;height:22px;background:rgba(255,255,255,.08);margin:0 2px;flex-shrink:0}
.ft-btn{width:30px;height:30px;border:none;border-radius:6px;background:transparent;color:var(--tx2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ft-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.ft-c{width:28px;height:28px;border-radius:6px;border:2px solid rgba(255,255,255,.12);overflow:hidden;position:relative;cursor:pointer;flex-shrink:0}
.ft-c:hover{border-color:var(--ac)}
.ft-c input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);border:none;cursor:pointer;padding:0}

/* ═══ RIGHT PANEL ═══ */
.panel{width:280px;background:var(--sp3);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;margin:12px 12px 12px 0;border-radius:8px}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.panel-head h3{font-family:Sora,sans-serif;font-size:13px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:6px}
.panel-head p{font-size:10px;color:var(--tx3);margin-top:2px}
.bg-sw{width:28px;height:28px;border-radius:8px;border:2px solid var(--bd2);overflow:hidden;position:relative;cursor:pointer}
.bg-sw:hover{border-color:var(--ac)}
.bg-sw input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);border:none;cursor:pointer;padding:0}
.blocks{flex:1;overflow-y:auto;padding:10px}
.blocks::-webkit-scrollbar{width:3px}.blocks::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.bcat{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:8px 2px 5px}
.bcat:first-child{padding-top:2px}
.bcat-t{color:var(--ac)}.bcat-m{color:#8b5cf6}.bcat-a{color:var(--gn)}.bcat-c{color:var(--am)}.bcat-l{color:#ec4899}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.bitem{background:linear-gradient(160deg,rgba(46,56,98,.55),rgba(35,41,82,.55),rgba(29,35,69,.55));border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 4px 10px;text-align:center;cursor:grab;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.2s;user-select:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.07);position:relative;overflow:hidden}
.bitem::before{content:'';position:absolute;top:-40%;left:-40%;width:180%;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);border-radius:50%;pointer-events:none}
.bitem:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(14,165,233,.18),0 0 0 1px rgba(14,165,233,.3),inset 0 1px 0 rgba(255,255,255,.1);border-color:rgba(14,165,233,.3)}
.bitem:active{transform:scale(.94)}
.bico{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.bico svg{width:22px;height:22px;stroke-width:1.8;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.bname{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:rgba(255,255,255,.4)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sp2);color:#fff;padding:10px 24px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--bd);transition:.3s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="tb">
  <a href="/pro/funnels" class="tb-brand"><svg width="28" height="28" viewBox="0 0 48 48"><rect x="6" y="6" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".9"/><rect x="26" y="6" width="16" height="16" rx="4" fill="#6366f1" opacity=".7"/><rect x="6" y="26" width="16" height="16" rx="4" fill="#6366f1" opacity=".5"/><rect x="26" y="26" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".3"/></svg><div class="tb-brand-t">Super<span>Pages</span></div></a>
  <div class="tb-title"><strong>{{ page.headline or page.title }}</strong></div>
  <div class="tb-dirty" id="dirty"></div>
  <div class="tb-sep"></div>
  <button class="tb-undo" onclick="doUndo()" title="Undo">&#x21a9;</button>
  <button class="tb-undo" onclick="doRedo()" title="Redo">&#x21aa;</button>
  <div class="tb-sep"></div>
  <button class="tb-btn tb-save" onclick="doSave()">Save</button>
  <div class="tb-pub" id="pubTog" onclick="togglePub()"><div class="tb-pubdot"></div><span id="pubLbl">Draft</span></div>
  <a href="/f/{{ page.slug }}" target="_blank" class="tb-open" id="openLnk">Open &#x2197;</a>
</div>

<!-- FLOATING TOOLBAR -->
<div id="ftb">
  <select id="ftFont" onchange="ftApply('fontFamily',this.value)"></select>
  <input type="number" id="ftSize" min="8" max="120" value="16" onchange="ftApply('fontSize',this.value+'px')">
  <div class="ft-sep"></div>
  <button class="ft-btn" onclick="ftCmd('bold')" title="Bold"><b>B</b></button>
  <button class="ft-btn" onclick="ftCmd('italic')" title="Italic"><i>I</i></button>
  <button class="ft-btn" onclick="ftCmd('underline')" title="Underline"><u>U</u></button>
  <div class="ft-sep"></div>
  <button class="ft-btn" onclick="ftApply('textAlign','left')" title="Left">&#x2261;</button>
  <button class="ft-btn" onclick="ftApply('textAlign','center')" title="Center">&#x2550;</button>
  <button class="ft-btn" onclick="ftApply('textAlign','right')" title="Right">&#x2262;</button>
  <div class="ft-sep"></div>
  <div class="ft-c" title="Text Colour"><input type="color" id="ftTxt" value="#ffffff" oninput="ftApply('color',this.value)"></div>
  <div class="ft-c" title="Background"><input type="color" id="ftBg" value="#000000" oninput="ftApply('backgroundColor',this.value)"></div>
  <div class="ft-sep"></div>
  <button class="ft-btn" onclick="ftDup()" title="Duplicate">&#x2750;</button>
  <button class="ft-btn" onclick="ftDel()" title="Delete" style="color:var(--rs)">&#x2715;</button>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">
  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas" id="canvas"></div>
  </div>
  <div class="panel">
    <div class="panel-head"><div><h3><svg width="16" height="16" viewBox="0 0 48 48"><rect x="6" y="6" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".9"/><rect x="26" y="6" width="16" height="16" rx="4" fill="#6366f1" opacity=".7"/><rect x="6" y="26" width="16" height="16" rx="4" fill="#6366f1" opacity=".5"/><rect x="26" y="26" width="16" height="16" rx="4" fill="#0ea5e9" opacity=".3"/></svg> Blocks</h3><p>Click or drag to canvas</p></div><div><div class="bg-sw" id="bgSw"><input type="color" id="bgPk" value="#050d1a" oninput="document.getElementById('canvas').style.background=this.value;markDirty()"></div></div></div>
    <div class="blocks">
      <div class="bcat bcat-t">Text</div><div class="bgrid">
        <div class="bitem" onclick="addEl('heading')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16"/><path d="M20 4v16"/><path d="M4 12h16"/></svg></span><span class="bname">Heading</span></div>
        <div class="bitem" onclick="addEl('text')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h10"/></svg></span><span class="bname">Text</span></div>
        <div class="bitem" onclick="addEl('label')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M7 10h10"/></svg></span><span class="bname">Label</span></div></div>
      <div class="bcat bcat-m">Media</div><div class="bgrid">
        <div class="bitem" onclick="addEl('image')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg></span><span class="bname">Image</span></div>
        <div class="bitem" onclick="addEl('video')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg></span><span class="bname">Video</span></div>
        <div class="bitem" onclick="addEl('box')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3" stroke-dasharray="4 3"/></svg></span><span class="bname">Box</span></div></div>
      <div class="bcat bcat-a">Actions</div><div class="bgrid">
        <div class="bitem" onclick="addEl('button')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="10" rx="5"/><path d="M8 12h8"/></svg></span><span class="bname">Button</span></div>
        <div class="bitem" onclick="addEl('optin')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 8h10M7 12h10M9 16h6"/></svg></span><span class="bname">Opt-In</span></div>
        <div class="bitem" onclick="addEl('cta')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/></svg></span><span class="bname">CTA</span></div></div>
      <div class="bcat bcat-c">Content</div><div class="bgrid">
        <div class="bitem" onclick="addEl('testimonial')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg></span><span class="bname">Review</span></div>
        <div class="bitem" onclick="addEl('stat')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="14" width="4" height="7" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="16" y="4" width="4" height="17" rx="1"/></svg></span><span class="bname">Stat</span></div>
        <div class="bitem" onclick="addEl('faq')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 015.12 2.13c0 1.62-2.12 2.25-2.12 3.87"/><circle cx="12" cy="18" r=".5" fill="#f59e0b"/></svg></span><span class="bname">FAQ</span></div></div>
      <div class="bcat bcat-l">Layout</div><div class="bgrid">
        <div class="bitem" onclick="addEl('divider')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round"><path d="M3 12h18"/></svg></span><span class="bname">Divider</span></div>
        <div class="bitem" onclick="addEl('spacer')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span><span class="bname">Spacer</span></div>
        <div class="bitem" onclick="addEl('hero')"><span class="bico"><svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 12h8M10 8h4"/></svg></span><span class="bname">Hero</span></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══ CONFIG ═══
var PID={{page.id}},SLUG='{{page.slug}}',_pub='{{page.status or "draft"}}',_dirty=false,_sel=null;
var _hist=[],_hIdx=-1;
var FONTS=['Outfit','Sora','DM Sans','Montserrat','Poppins','Raleway','Open Sans','Lato','Roboto','Inter','Playfair Display','Oswald','Anton','Bebas Neue','Dancing Script','Pacifico','Caveat','Josefin Sans','Space Grotesk','Permanent Marker','Bangers','Satisfy','Arial','Georgia','Times New Roman','Verdana','Impact','Courier New'];
var ftFontEl=document.getElementById('ftFont');
FONTS.forEach(function(f){var o=document.createElement('option');o.value=f;o.textContent=f;o.style.fontFamily=f;ftFontEl.appendChild(o)});
if(_pub==='published'){document.getElementById('pubTog').classList.add('live');document.getElementById('pubLbl').textContent='Live';document.getElementById('openLnk').classList.add('on')}

// ═══ ELEMENT DEFINITIONS ═══
var DEFS={
  heading:{tag:'h1',txt:'Your Headline Here',w:500,h:60,s:{fontFamily:'Sora',fontWeight:'900',fontSize:'42px',color:'#fff',textAlign:'center',padding:'10px 20px'}},
  text:{tag:'p',txt:'Enter your text here. Double-click to edit.',w:500,h:80,s:{fontFamily:'Outfit',fontSize:'16px',color:'#94a3b8',lineHeight:'1.8',padding:'10px 20px'}},
  label:{tag:'span',txt:'LABEL TEXT',w:160,h:36,s:{fontFamily:'DM Sans',fontWeight:'700',fontSize:'12px',color:'#38bdf8',letterSpacing:'1px',textTransform:'uppercase',background:'rgba(56,189,248,0.1)',padding:'6px 16px',borderRadius:'20px',textAlign:'center'}},
  button:{tag:'a',txt:'Click Here &#x2192;',w:300,h:54,s:{fontFamily:'Sora',fontWeight:'700',fontSize:'17px',color:'#fff',background:'linear-gradient(135deg,#0ea5e9,#6366f1)',padding:'14px 40px',borderRadius:'12px',textAlign:'center',textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center'}},
  cta:{tag:'a',txt:'Get Started Now &#x2192;',w:400,h:60,s:{fontFamily:'Sora',fontWeight:'800',fontSize:'19px',color:'#fff',background:'linear-gradient(135deg,#6366f1,#0ea5e9)',padding:'16px 48px',borderRadius:'14px',textAlign:'center',textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(14,165,233,0.3)'}},
  testimonial:{tag:'div',txt:'&#x2605;&#x2605;&#x2605;&#x2605;&#x2605;<br><br><em>"This platform changed everything for me."</em><br><br><small>&#x2014; Happy Member</small>',w:500,h:180,s:{fontFamily:'Outfit',fontSize:'16px',color:'#e2e8f0',background:'#1e293b',borderLeft:'4px solid #0ea5e9',borderRadius:'16px',padding:'24px 28px',lineHeight:'1.7'}},
  stat:{tag:'div',txt:'<div style="font-family:Sora;font-weight:900;font-size:56px;color:#0ea5e9;line-height:1">95%</div><div style="font-size:14px;color:#64748b;margin-top:8px;letter-spacing:1px;text-transform:uppercase">Paid Out</div>',w:200,h:120,s:{textAlign:'center',padding:'20px'}},
  faq:{tag:'div',txt:'<strong>Q: How does this work?</strong><br><br>Double-click to edit this answer text.',w:500,h:120,s:{fontFamily:'Outfit',fontSize:'15px',color:'#94a3b8',background:'rgba(255,255,255,0.03)',padding:'20px',borderRadius:'12px',lineHeight:'1.7'}},
  image:{tag:'div',txt:'&#x1f5bc; Click to add image',w:400,h:250,s:{background:'#1e293b',border:'2px dashed #334155',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:'14px'}},
  video:{tag:'div',txt:'&#x25b6; Click to add video',w:500,h:300,s:{background:'#0f172a',border:'2px dashed #334155',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b',fontSize:'14px'}},
  box:{tag:'div',txt:'',w:300,h:200,s:{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'16px'}},
  divider:{tag:'hr',txt:'',w:600,h:2,s:{border:'none',borderTop:'1px solid rgba(255,255,255,0.08)'}},
  spacer:{tag:'div',txt:'',w:100,h:60,s:{background:'transparent'}},
  hero:{tag:'section',txt:'<h1 style="font-family:Sora;font-weight:900;font-size:48px;color:#fff;margin:0 0 16px">Your Headline</h1><p style="font-size:18px;color:#94a3b8;max-width:600px;line-height:1.8;margin:0 0 32px">Describe your offer here.</p>',w:800,h:400,s:{padding:'60px 40px',textAlign:'center',background:'linear-gradient(135deg,#050d1a,#0f172a)',borderRadius:'16px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
  optin:{tag:'div',txt:'<h3 style="font-family:Sora;font-weight:800;font-size:22px;color:#fff;margin:0 0 8px">Get Free Access</h3><p style="font-size:14px;color:#94a3b8;margin:0 0 20px">Enter your details below</p><input type="text" placeholder="Your name" style="width:100%;padding:12px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#1a1a2e;font-size:14px;margin-bottom:10px;box-sizing:border-box"><input type="email" placeholder="Your email" style="width:100%;padding:12px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#1a1a2e;font-size:14px;margin-bottom:14px;box-sizing:border-box"><button style="width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;font-family:Sora;font-weight:700;font-size:15px;cursor:pointer">Get Access &#x2192;</button>',w:400,h:340,s:{background:'rgba(15,23,41,0.5)',border:'1px solid rgba(14,165,233,0.15)',borderRadius:'20px',padding:'32px',textAlign:'center'}},
};

// ═══ CREATE ELEMENT ═══
var _eid=0;
function addEl(type,x,y,w,h,id,extra){
  var d=DEFS[type];if(!d)return;
  var el=document.createElement(d.tag==='hr'?'div':d.tag);
  el.className='sp-el';
  el.id=id||('el_'+(++_eid)+'_'+Date.now().toString(36));
  el.dataset.type=type;
  el.innerHTML=extra&&extra.txt!==undefined?extra.txt:d.txt;
  el.style.position='absolute';
  el.style.left=(x||100)+'px';
  el.style.top=(y||100+_eid*30)+'px';
  el.style.width=(w||d.w)+'px';
  if(d.tag!=='hr')el.style.height=(h||d.h)+'px';
  Object.keys(d.s).forEach(function(k){el.style[k]=d.s[k]});
  if(extra&&extra.s){Object.keys(extra.s).forEach(function(k){el.style[k]=extra.s[k]})}
  document.getElementById('canvas').appendChild(el);
  wireEl(el);
  markDirty();
  pushHist();
  return el;
}

// ═══ WIRE interact.js ON ELEMENT ═══
function wireEl(el){
  interact(el)
    .draggable({
      inertia:false,
      modifiers:[interact.modifiers.restrictRect({restriction:'parent'})],
      listeners:{
        move:function(e){
          var t=e.target;
          var x=(parseFloat(t.style.left)||0)+e.dx;
          var y=(parseFloat(t.style.top)||0)+e.dy;
          t.style.left=x+'px';
          t.style.top=y+'px';
        },
        end:function(){markDirty();pushHist()}
      }
    })
    .resizable({
      edges:{left:true,right:true,bottom:true,top:true},
      modifiers:[
        interact.modifiers.restrictEdges({outer:'parent'}),
        interact.modifiers.restrictSize({min:{width:40,height:20}})
      ],
      listeners:{
        move:function(e){
          var t=e.target;
          var x=(parseFloat(t.style.left)||0)+e.deltaRect.left;
          var y=(parseFloat(t.style.top)||0)+e.deltaRect.top;
          t.style.width=e.rect.width+'px';
          t.style.height=e.rect.height+'px';
          t.style.left=x+'px';
          t.style.top=y+'px';
        },
        end:function(){markDirty();pushHist()}
      }
    });

  // Click to select
  el.addEventListener('mousedown',function(e){
    if(el.classList.contains('editing'))return;
    selectEl(el);
  });
  // Double-click to edit text
  el.addEventListener('dblclick',function(e){
    if(el.dataset.type==='image'||el.dataset.type==='video'||el.dataset.type==='divider'||el.dataset.type==='spacer')return;
    el.contentEditable='true';
    el.classList.add('editing');
    el.classList.remove('selected');
    el.focus();
    // Disable drag while editing
    interact(el).draggable(false);
  });
  el.addEventListener('blur',function(){
    el.contentEditable='false';
    el.classList.remove('editing');
    interact(el).draggable(true);
    markDirty();pushHist();
  });
}

// ═══ SELECTION ═══
function selectEl(el){
  if(_sel&&_sel!==el){_sel.classList.remove('selected');_sel.contentEditable='false';_sel.classList.remove('editing')}
  _sel=el;
  el.classList.add('selected');
  showFtb(el);
}
function deselectAll(){
  if(_sel){_sel.classList.remove('selected');_sel.contentEditable='false';_sel.classList.remove('editing')}
  _sel=null;
  document.getElementById('ftb').classList.remove('on');
}
document.getElementById('canvas').addEventListener('mousedown',function(e){
  if(e.target===this)deselectAll();
});

// ═══ FLOATING TOOLBAR ═══
function showFtb(el){
  var ftb=document.getElementById('ftb');
  ftb.classList.add('on');
  // Read current styles
  var cs=window.getComputedStyle(el);
  ftFontEl.value=cs.fontFamily.split(',')[0].replace(/['"]/g,'').trim();
  document.getElementById('ftSize').value=parseInt(cs.fontSize)||16;
  document.getElementById('ftTxt').value=rgbHex(cs.color);
  document.getElementById('ftBg').value=rgbHex(cs.backgroundColor);
  posFtb(el);
}
function posFtb(el){
  var r=el.getBoundingClientRect();
  var cw=document.getElementById('canvasWrap').getBoundingClientRect();
  var ftb=document.getElementById('ftb');
  var x=r.left;
  var y=r.top-50;
  if(y<60)y=r.bottom+8;
  ftb.style.left=Math.max(10,Math.min(x,window.innerWidth-750))+'px';
  ftb.style.top=Math.max(60,y)+'px';
}
function rgbHex(c){if(!c||c==='transparent'||c==='rgba(0, 0, 0, 0)')return'#000000';if(c.charAt(0)==='#')return c;var m=c.match(/\d+/g);if(!m||m.length<3)return'#000000';return'#'+((1<<24)+(+m[0]<<16)+(+m[1]<<8)+ +m[2]).toString(16).slice(1)}
function ftApply(prop,val){if(!_sel)return;_sel.style[prop]=val;markDirty()}
function ftCmd(cmd){document.execCommand(cmd,false,null);markDirty()}
function ftDup(){if(!_sel)return;var cl=_sel.cloneNode(true);cl.id='el_'+(++_eid)+'_'+Date.now().toString(36);cl.style.left=(parseFloat(_sel.style.left)+20)+'px';cl.style.top=(parseFloat(_sel.style.top)+20)+'px';cl.classList.remove('selected','editing');cl.contentEditable='false';document.getElementById('canvas').appendChild(cl);wireEl(cl);selectEl(cl);markDirty();pushHist()}
function ftDel(){if(!_sel)return;_sel.remove();_sel=null;document.getElementById('ftb').classList.remove('on');markDirty();pushHist()}

// ═══ UNDO/REDO ═══
function pushHist(){var html=document.getElementById('canvas').innerHTML;if(_hIdx>=0&&_hist[_hIdx]===html)return;if(_hIdx<_hist.length-1)_hist.splice(_hIdx+1);_hist.push(html);if(_hist.length>50)_hist.shift();else _hIdx++;_hIdx=_hist.length-1}
function doUndo(){if(_hIdx<=0)return;_hIdx--;loadHist()}
function doRedo(){if(_hIdx>=_hist.length-1)return;_hIdx++;loadHist()}
function loadHist(){document.getElementById('canvas').innerHTML=_hist[_hIdx];_sel=null;document.getElementById('ftb').classList.remove('on');document.querySelectorAll('.sp-el').forEach(wireEl);markDirty()}

// ═══ SAVE/LOAD ═══
function markDirty(){_dirty=true;document.getElementById('dirty').classList.add('on')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2500)}

function serialise(){
  var els=[];
  document.querySelectorAll('#canvas .sp-el').forEach(function(el){
    els.push({id:el.id,type:el.dataset.type,x:parseFloat(el.style.left)||0,y:parseFloat(el.style.top)||0,w:parseFloat(el.style.width)||100,h:parseFloat(el.style.height)||50,txt:el.innerHTML,s:el.style.cssText});
  });
  return JSON.stringify({v:'sp7',bg:document.getElementById('canvas').style.background||'#050d1a',els:els});
}

function exportHTML(){
  var bg=document.getElementById('canvas').style.background||'#050d1a';
  var h='<div style="position:relative;min-height:100vh;background:'+bg+';font-family:Outfit,sans-serif">';
  document.querySelectorAll('#canvas .sp-el').forEach(function(el){
    var tag=el.tagName.toLowerCase();
    h+='<'+tag+' style="'+el.style.cssText+'">'+el.innerHTML+'</'+tag+'>';
  });
  return h+'</div>';
}

async function doSave(){
  var data=serialise();
  var html=exportHTML();
  try{
    var r=await fetch('/api/funnels/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:PID,title:'{{page.title|e}}',headline:'{{page.headline or page.title|e}}',gjs_css:data,gjs_html:html,status:_pub})});
    var d=await r.json();
    if(d.success||d.id){_dirty=false;document.getElementById('dirty').classList.remove('on');toast('Saved!');if(d.slug)document.getElementById('openLnk').href='/f/'+d.slug}
    else toast('Error: '+(d.error||''));
  }catch(e){toast('Save error')}
}

function loadPage(){
  try{
    var raw={{(page.gjs_css or '')|tojson|safe}};
    if(raw&&raw.trim()){
      var p=JSON.parse(raw);
      // New SP7 format
      if(p.v==='sp7'&&p.els){
        if(p.bg)document.getElementById('canvas').style.background=p.bg;
        p.els.forEach(function(e){
          var el=addEl(e.type,e.x,e.y,e.w,e.h,e.id,{txt:e.txt});
          if(el&&e.s)el.style.cssText=e.s;
        });
        pushHist();
        return;
      }
      // Old GrapesJS format — load as HTML
      if(p.v==='grapes'&&p.components){
        // Just load the HTML export
      }
    }
    var savedHtml={{(page.gjs_html or '')|tojson|safe}};
    if(savedHtml&&savedHtml.trim()){
      // Render saved HTML into canvas as raw HTML
      document.getElementById('canvas').innerHTML=savedHtml;
      pushHist();
      return;
    }
  }catch(e){console.error('Load:',e)}
  // Default empty state
  pushHist();
}

// ═══ PUBLISH ═══
function togglePub(){
  _pub=_pub==='published'?'draft':'published';
  var tg=document.getElementById('pubTog'),lb=document.getElementById('pubLbl'),lk=document.getElementById('openLnk');
  if(_pub==='published'){tg.classList.add('live');lb.textContent='Live';lk.classList.add('on');toast('Published!')}
  else{tg.classList.remove('live');lb.textContent='Draft';lk.classList.remove('on');toast('Unpublished')}
  _dirty=true;doSave();
}

// ═══ KEYBOARD ═══
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();doSave()}
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo()}
  if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doRedo()}
  if(e.key==='Delete'||e.key==='Backspace'){if(_sel&&!_sel.classList.contains('editing')&&document.activeElement.tagName!=='INPUT'){e.preventDefault();ftDel()}}
  if(e.key==='Escape')deselectAll();
});

// ═══ AUTO-SAVE ═══
setInterval(function(){if(_dirty)doSave()},30000);

// ═══ INIT ═══
loadPage();
</script>
