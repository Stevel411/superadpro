<script src="https://unpkg.com/grapesjs-preset-webpage"></script>
<script src="https://unpkg.com/grapesjs-plugin-forms"></script>
<style>
/* ═══ SuperAdPro Dark Theme for GrapesJS ═══ */
:root{--sa-shell:#0a0e1a;--sa-shell2:#111627;--sa-panel:#131830;--sa-border:rgba(255,255,255,0.06);--sa-accent:#0ea5e9;--sa-accent2:#6366f1;--sa-green:#10b981;--sa-rose:#f43f5e;--sa-amber:#f59e0b;--sa-text:#e8eaf0;--sa-text2:#8b92a8;--sa-text3:#565e78}
body{margin:0;padding:0;background:var(--sa-shell);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden;height:100vh}

/* ── GrapesJS Theme Overrides ── */
.gjs-one-bg{background-color:var(--sa-panel)!important}
.gjs-two-color{color:var(--sa-text2)!important}
.gjs-three-bg{background-color:var(--sa-accent)!important;color:#fff!important}
.gjs-four-color,.gjs-four-color-h:hover{color:var(--sa-accent)!important}

/* Editor container */
#gjs{border:none;height:calc(100vh - 52px)}
.gjs-editor{background:var(--sa-shell)!important}
.gjs-cv-canvas{background:radial-gradient(ellipse at center,#111828,#0a0e1a)!important}

/* Panels */
.gjs-pn-panel{background:var(--sa-panel)!important;border-color:var(--sa-border)!important}
.gjs-pn-views,.gjs-pn-views-container{background:var(--sa-panel)!important}
.gjs-pn-commands,.gjs-pn-options{background:var(--sa-shell2)!important}
.gjs-pn-btn{color:var(--sa-text2)!important;border-radius:6px!important}
.gjs-pn-btn:hover{color:var(--sa-text)!important;background:rgba(255,255,255,.06)!important}
.gjs-pn-btn.gjs-pn-active{color:var(--sa-accent)!important;background:rgba(14,165,233,.1)!important}

/* Blocks */
.gjs-blocks-cs{background:var(--sa-panel)!important}
.gjs-block{background:linear-gradient(160deg,rgba(46,56,98,.5),rgba(35,41,82,.5),rgba(29,35,69,.5))!important;border:1px solid rgba(255,255,255,.08)!important;border-radius:10px!important;color:var(--sa-text2)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)!important;transition:.2s!important;min-height:60px!important}
.gjs-block:hover{border-color:rgba(14,165,233,.3)!important;box-shadow:0 4px 16px rgba(14,165,233,.15),inset 0 1px 0 rgba(255,255,255,.1)!important;transform:translateY(-1px)}
.gjs-block__media{color:var(--sa-accent)!important}
.gjs-block-label{font-size:10px!important;font-weight:700!important;letter-spacing:.3px!important}
.gjs-block-category .gjs-title{background:var(--sa-panel)!important;color:var(--sa-text3)!important;font-size:10px!important;font-weight:800!important;letter-spacing:1px!important;text-transform:uppercase!important;border-bottom:1px solid var(--sa-border)!important;padding:8px 10px!important}

/* Style Manager */
.gjs-sm-sector .gjs-sm-sector-title{background:var(--sa-panel)!important;color:var(--sa-text2)!important;border-color:var(--sa-border)!important;font-weight:700!important;font-size:11px!important}
.gjs-sm-sector .gjs-sm-property{color:var(--sa-text2)!important}
.gjs-sm-sector .gjs-sm-property .gjs-sm-label{color:var(--sa-text3)!important;font-size:10px!important}
.gjs-field{background:rgba(255,255,255,.04)!important;border-color:rgba(255,255,255,.1)!important;color:var(--sa-text)!important;border-radius:6px!important}
.gjs-field:focus-within{border-color:var(--sa-accent)!important}
.gjs-radio-item{border-color:rgba(255,255,255,.1)!important;color:var(--sa-text3)!important}
.gjs-radio-item:checked,.gjs-radio-item input:checked+.gjs-radio-item-label{background:rgba(14,165,233,.15)!important;color:var(--sa-accent)!important;border-color:var(--sa-accent)!important}
.gjs-clm-tags{background:var(--sa-panel)!important;border-color:var(--sa-border)!important}
.gjs-clm-tags .gjs-clm-tag{background:rgba(14,165,233,.1)!important;color:var(--sa-accent)!important;border-radius:4px!important}

/* Layer Manager */
.gjs-layers{background:var(--sa-panel)!important}
.gjs-layer{background:transparent!important;border-bottom:1px solid var(--sa-border)!important}
.gjs-layer:hover{background:rgba(255,255,255,.03)!important}
.gjs-layer-name{color:var(--sa-text2)!important;font-size:11px!important}

/* Trait Manager */
.gjs-trt-traits{background:var(--sa-panel)!important}
.gjs-trt-trait{color:var(--sa-text2)!important;border-bottom:1px solid var(--sa-border)!important}
.gjs-trt-trait .gjs-label{color:var(--sa-text3)!important}

/* Scrollbars */
.gjs-editor ::-webkit-scrollbar{width:5px;height:5px}
.gjs-editor ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.gjs-editor ::-webkit-scrollbar-track{background:transparent}

/* Canvas frame */
.gjs-frame-wrapper{background:transparent!important}

/* ── Custom Topbar ── */
.sa-topbar{height:52px;background:var(--sa-shell2);border-bottom:1px solid var(--sa-border);display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;z-index:100;position:relative}
.sa-logo{font-family:Sora,sans-serif;font-weight:800;font-size:15px;color:#fff;padding:0 8px;text-decoration:none}
.sa-logo em{color:var(--sa-accent);font-style:normal}
.sa-sep{width:1px;height:24px;background:var(--sa-border);margin:0 4px}
.sa-title{font-size:12px;color:var(--sa-text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sa-title strong{color:var(--sa-text);font-weight:600}
.sa-btn{padding:6px 14px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none;white-space:nowrap;font-family:inherit}
.sa-ghost{background:rgba(255,255,255,.04);color:var(--sa-text3);border:1px solid var(--sa-border)}
.sa-ghost:hover{background:rgba(255,255,255,.08);color:var(--sa-text)}
.sa-save{background:var(--sa-green);color:#fff}.sa-save:hover{background:#059669}
.sa-pub{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;border:1px solid var(--sa-border);background:rgba(255,255,255,.03);cursor:pointer;font-size:11px;font-weight:700;color:var(--sa-text3)}
.sa-pub.live{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:var(--sa-green)}
.sa-dot{width:7px;height:7px;border-radius:50%;background:var(--sa-text3)}
.sa-pub.live .sa-dot{background:var(--sa-green);box-shadow:0 0 8px rgba(16,185,129,.5)}
.sa-open{padding:5px 10px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;color:var(--sa-green);background:rgba(16,185,129,.08);display:none;align-items:center;gap:3px}
.sa-open.show{display:inline-flex}
.sa-dirty{width:7px;height:7px;border-radius:50%;background:var(--sa-amber);display:none;flex-shrink:0}
.sa-dirty.show{display:block}
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══ -->
<div class="sa-topbar">
  <a href="/pro/funnels" class="sa-logo">SuperAd<em>Pro</em></a>
  <div class="sa-sep"></div>
  <div class="sa-title"><strong>{{ page.headline or page.title }}</strong></div>
  <div class="sa-dirty" id="dirtyDot"></div>
  <div class="sa-sep"></div>
  <button class="sa-btn sa-ghost" onclick="editorSave()">&#x1f4be; Save</button>
  <div class="sa-pub" id="pubToggle" onclick="togglePub()"><div class="sa-dot"></div><span id="pubLabel">Draft</span></div>
  <a href="/f/{{ page.slug }}" target="_blank" class="sa-open" id="openLink">Open &#x2197;</a>
</div>

<!-- ═══ GRAPESJS EDITOR ═══ -->
<div id="gjs"></div>

<script>
// ── Config ──
const PAGE_ID = {{ page.id }};
const PAGE_SLUG = '{{ page.slug }}';
let _pubStatus = '{{ page.status or "draft" }}';
let _dirty = false;

// Init publish state
if (_pubStatus === 'published') {
  document.getElementById('pubToggle').classList.add('live');
  document.getElementById('pubLabel').textContent = 'Live';
  document.getElementById('openLink').classList.add('show');

// ── Google Fonts list for Style Manager ──
const FONTS = [
  'Outfit','Sora','DM Sans','Montserrat','Poppins','Raleway','Open Sans','Lato','Roboto',
  'Nunito','Inter','Rubik','Quicksand','Mulish','Lexend','Manrope','Figtree',
  'Playfair Display','Merriweather','Lora','Dancing Script','Pacifico','Caveat',
  'Oswald','Anton','Bebas Neue','Cinzel','Libre Baskerville','Cormorant Garamond',
  'Fira Sans','Karla','Arial','Georgia','Times New Roman','Courier New'
].map(f => ({value: f, name: f}));

// ── Init GrapesJS ──
const editor = grapesjs.init({
  container: '#gjs',
  height: 'calc(100vh - 52px)',
  width: 'auto',
  fromElement: false,
  storageManager: false, // We handle save/load ourselves
  canvas: {

      'https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap'
    ],
  },
  plugins: ['gjs-blocks-basic', 'gjs-preset-webpage', 'gjs-plugin-forms'],

  styleManager: {

          { property: 'color' },
          { property: 'line-height' },

          { property: 'text-transform' },

          { property: 'display' },
          { property: 'width' },

          { property: 'max-width' },
          { property: 'min-height' },
          { property: 'margin' },
          { property: 'padding' },
        ]

      {
        name: 'Appearance',
        properties: [
          { property: 'background-color' },
          { property: 'background' },
          { property: 'opacity' },
          { property: 'border-radius' },
          { property: 'border' },
          { property: 'box-shadow' },
        ]
      },
      {
        name: 'Position',
        properties: [
          { property: 'position' },
          { property: 'top' },

      {
        name: 'Flex',
        properties: [
          { property: 'flex-direction' },
          { property: 'justify-content' },
          { property: 'align-items' },
          { property: 'gap' },
          { property: 'flex-wrap' },
        ]
      },
    ],
  },
  assetManager: {
    upload: '/api/funnels/upload-image',
    uploadName: 'file',
    multiUpload: false,
    autoAdd: true,
  },
});

// ── Custom SuperAdPro Marketing Blocks ──
const bm = editor.Blocks;

bm.add('sa-hero', {
  label: 'Hero Section',
  category: 'SuperAdPro',
  content: `<section style="padding:80px 40px;text-align:center;background:linear-gradient(135deg,#050d1a,#0f172a);min-height:500px;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <h1 style="font-family:Sora,sans-serif;font-weight:900;font-size:48px;color:#fff;margin:0 0 16px;max-width:800px">Your Headline Goes Here</h1>
    <p style="font-family:Outfit,sans-serif;font-size:18px;color:#94a3b8;max-width:600px;line-height:1.8;margin:0 0 32px">Describe your offer in a compelling way. What problem do you solve? What transformation do you deliver?</p>
    <a style="display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;font-family:Sora,sans-serif;font-weight:700;font-size:17px;border-radius:12px;text-decoration:none">Get Started Now →</a>
  </section>`,
  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 12h8M10 8h4"/></svg>',
});

bm.add('sa-testimonial', {
  label: 'Testimonial',
  category: 'SuperAdPro',
  content: `<div style="background:#1e293b;border-left:4px solid #0ea5e9;border-radius:16px;padding:28px 32px;max-width:700px;margin:20px auto">
    <div style="color:#fbbf24;font-size:18px;margin-bottom:12px">★★★★★</div>
    <p style="font-family:Outfit,sans-serif;font-size:16px;color:#e2e8f0;line-height:1.7;font-style:italic;margin:0 0 16px">"This platform completely changed how I approach my business. The tools are incredible and the community is so supportive."</p>
    <p style="font-family:DM Sans,sans-serif;font-size:13px;color:#64748b;font-weight:600;margin:0">— Jane D., Online Coach</p>
  </div>`,
  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>',
});

bm.add('sa-stat', {
  label: 'Stat Block',
  category: 'SuperAdPro',
  content: `<div style="text-align:center;padding:40px 20px">
    <div style="font-family:Sora,sans-serif;font-weight:900;font-size:56px;color:#0ea5e9;line-height:1">95%</div>
    <div style="font-family:Outfit,sans-serif;font-size:14px;color:#64748b;margin-top:8px;letter-spacing:1px;text-transform:uppercase">Paid Out</div>
  </div>`,
  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="14" width="4" height="7" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="16" y="4" width="4" height="17" rx="1"/></svg>',

  label: 'CTA Button',
  category: 'SuperAdPro',
  content: `<div style="text-align:center;padding:20px">

  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="10" rx="5"/><path d="M8 12h8"/></svg>',

  label: 'Opt-In Form',
  category: 'SuperAdPro',
  content: `<div style="background:rgba(15,23,41,0.5);border:1px solid rgba(14,165,233,0.15);border-radius:20px;padding:32px;max-width:500px;margin:20px auto;text-align:center">
    <h3 style="font-family:Sora,sans-serif;font-weight:800;font-size:22px;color:#fff;margin:0 0 8px">Get Free Access</h3>
    <p style="font-family:Outfit,sans-serif;font-size:14px;color:#94a3b8;margin:0 0 20px">Enter your details below to get started</p>
    <input type="text" placeholder="Your name" style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#1a1a2e;font-size:14px;margin-bottom:10px;box-sizing:border-box;font-family:Outfit,sans-serif">
    <input type="email" placeholder="Your email" style="width:100%;padding:12px 16px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#1a1a2e;font-size:14px;margin-bottom:14px;box-sizing:border-box;font-family:Outfit,sans-serif">
    <button style="width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;font-family:Sora,sans-serif;font-weight:700;font-size:15px;cursor:pointer">Get Access →</button>
  </div>`,
  media: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 8h10M7 12h10M9 16h6"/></svg>',
});

bm.add('sa-features', {
  label: 'Feature List',
  category: 'SuperAdPro',
  content: `<div style="max-width:700px;margin:20px auto;padding:20px">
    <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06);align-items:flex-start"><span style="color:#0ea5e9;font-weight:700;font-size:16px;flex-shrink:0">✓</span><span style="font-family:Outfit,sans-serif;font-size:15px;color:#94a3b8;line-height:1.6">Four income streams that stack on top of each other</span></div>
    <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06);align-items:flex-start"><span style="color:#0ea5e9;font-weight:700;font-size:16px;flex-shrink:0">✓</span><span style="font-family:Outfit,sans-serif;font-size:15px;color:#94a3b8;line-height:1.6">Nine AI marketing tools included at no extra cost</span></div>

});

bm.add('sa-divider', {
  label: 'Divider',
  category: 'SuperAdPro',
  content: '<div style="padding:20px 0"><hr style="border:none;border-top:1px solid rgba(255,255,255,0.08);max-width:700px;margin:0 auto"></div>',

});

bm.add('sa-spacer', {
  label: 'Spacer',
  category: 'SuperAdPro',
  content: '<div style="height:60px"></div>',

// ── Track changes for dirty indicator ──
editor.on('change:changesCount', () => {
  _dirty = true;
  document.getElementById('dirtyDot').classList.add('show');
});

// ── Save Function ──
async function editorSave() {
  const components = JSON.stringify(editor.getComponents());
  const styles = JSON.stringify(editor.getStyle());
  const html = editor.getHtml();
  const css = editor.getCss();

  const payload = {
    id: PAGE_ID,
    title: '{{ page.title|e }}',
    headline: '{{ page.headline or page.title|e }}',
    gjs_components: components,
    gjs_styles: styles,
    gjs_html: '<style>' + css + '</style>' + html,
    gjs_css: JSON.stringify({v:'grapes', components: components, styles: styles}),
    status: _pubStatus,
  };

  try {
    const res = await fetch('/api/funnels/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await res.json();
    if (d.success || d.id) {
      _dirty = false;
      document.getElementById('dirtyDot').classList.remove('show');
      if (d.slug) document.getElementById('openLink').href = '/f/' + d.slug;
      // Brief flash on save button
      const btn = document.querySelector('.sa-save');
      if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = '💾 Save', 1500); }
    }
  } catch(e) { console.error('Save error:', e); }
}

// ── Load existing page data ──
(function loadPage() {
  try {
    const raw = {{ (page.gjs_css or '')|tojson|safe }};
    if (raw && raw.trim()) {
      const parsed = JSON.parse(raw);
      // New GrapesJS format
      if (parsed.v === 'grapes' && parsed.components) {
        editor.setComponents(JSON.parse(parsed.components));
        if (parsed.styles) editor.setStyle(JSON.parse(parsed.styles));
        return;
      }
      // Fabric.js format migration
      if (parsed.objects) {
        // Convert Fabric objects to HTML
        let html = '<div style="max-width:1100px;margin:0 auto;padding:40px 20px;min-height:600px">';
        // Basic migration — text objects become divs
        (parsed.objects || []).forEach(obj => {
          if (obj.type === 'textbox') {
            const s = `font-family:${obj.fontFamily||'Outfit'};font-size:${obj.fontSize||16}px;font-weight:${obj.fontWeight||400};color:${obj.fill||'#e2e8f0'};text-align:${obj.textAlign||'left'};line-height:${obj.lineHeight||1.4};${obj.backgroundColor?'background:'+obj.backgroundColor+';':''}${obj.padding?'padding:'+obj.padding+'px;':''}margin-bottom:20px;`;
            html += `<div style="${s}">${(obj.text||'').replace(/\n/g,'<br>')}</div>`;
          }
        });
        html += '</div>';
        editor.setComponents(html);
        if (parsed.background) editor.setStyle(`body{background:${parsed.background}}`);
        return;
      }
      // Old custom format migration
      if (parsed.els && Array.isArray(parsed.els)) {
        let html = `<div style="max-width:1100px;margin:0 auto;padding:40px 20px;min-height:600px;background:${parsed.canvasBg||'#050d1a'}">`;
        parsed.els.forEach(el => {
          const s = el.s || {};
          if (['heading','text','label','button','cta','testimonial','stat','faq','form','review','badge','icontext','logostrip','separator'].includes(el.type)) {
            let style = `font-family:${(s.fontFamily||'Outfit').split(',')[0]};font-size:${s.fontSize||'16px'};font-weight:${s.fontWeight||'400'};color:${s.color||'#e2e8f0'};text-align:${s.textAlign||'left'};line-height:${s.lineHeight||'1.4'};${s.background?'background:'+s.background+';':''}${s.borderRadius?'border-radius:'+s.borderRadius+';':''}${s.border?'border:'+s.border+';':''}${s.padding?'padding:'+s.padding+';':''}margin-bottom:20px;`;
            html += `<div style="${style}">${el.txt||''}</div>`;
          } else if (el.type === 'divider') {
            html += `<hr style="border:none;border-top:2px solid ${s.background||'#334155'};margin:20px 0">`;
          } else if (el.type === 'video' && el.txt) {
            html += `<div style="margin:20px 0"><iframe src="${el.txt}" style="width:100%;height:450px;border:none;border-radius:12px" allowfullscreen></iframe></div>`;
          } else if (el.type === 'image' && el.txt) {
            html += `<img src="${el.txt}" style="max-width:100%;border-radius:12px;margin:20px 0">`;
          }
        });
        html += '</div>';
        editor.setComponents(html);
        return;
      }
    }
    // Check gjs_html for previously saved rendered HTML
    const savedHtml = {{ (page.gjs_html or '')|tojson|safe }};
    if (savedHtml && savedHtml.trim()) {
      editor.setComponents(savedHtml);
      return;
    }
  } catch(e) { console.error('Load error:', e); }
  // Empty — show default content
  editor.setComponents(`<section style="padding:80px 40px;text-align:center;background:#050d1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <h1 style="font-family:Sora,sans-serif;font-weight:900;font-size:42px;color:#fff;margin:0 0 16px">Start Building Your Page</h1>
    <p style="font-family:Outfit,sans-serif;font-size:16px;color:#94a3b8;max-width:500px;line-height:1.7;margin:0">Drag blocks from the right panel to build your landing page. Double-click any text to edit it.</p>
  </section>`);
})();

// ── Publish toggle ──
function togglePub() {
  _pubStatus = _pubStatus === 'published' ? 'draft' : 'published';
  const tg = document.getElementById('pubToggle');
  const lb = document.getElementById('pubLabel');
  const lk = document.getElementById('openLink');
  if (_pubStatus === 'published') {
    tg.classList.add('live'); lb.textContent = 'Live'; lk.classList.add('show');
  } else {
    tg.classList.remove('live'); lb.textContent = 'Draft'; lk.classList.remove('show');
  }
  _dirty = true;
  editorSave();
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    editorSave();
  }
});

// ── Auto-save every 30 seconds ──
setInterval(() => { if (_dirty) editorSave(); }, 30000);
</script>
</body>
