<!-- SuperAdPro AI Chat Widget -->
<style>
#sap-chat-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00c8e8, #0090b8);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,200,232,0.4);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
#sap-chat-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(0,200,232,0.55);
}
#sap-chat-btn svg { width: 26px; height: 26px; }
#sap-chat-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 14px;
  height: 14px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid #050d1a;
  display: none;
}
#sap-chat-window {
  position: fixed;
  bottom: 92px;
  right: 24px;
  width: 360px;
  height: 500px;
  background: #0a1628;
  border: 1px solid rgba(0,200,232,0.2);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  z-index: 9998;
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
#sap-chat-window.open { display: flex; }
.sap-chat-header {
  background: linear-gradient(135deg, #00c8e8 0%, #0088b0 100%);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sap-chat-header-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sap-chat-header-info { flex: 1; }
.sap-chat-header-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}
.sap-chat-header-status {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  gap: 4px;
}
.sap-status-dot {
  width: 7px;
  height: 7px;
  background: #22c55e;
  border-radius: 50%;
  animation: sapPulse 2s infinite;
}
@keyframes sapPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sap-chat-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.8);
  cursor: pointer;
  padding: 4px;
  font-size: 18px;
  line-height: 1;
}
.sap-chat-close:hover { color: #fff; }
.sap-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,200,232,0.2) transparent;
}
.sap-msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.5;
  animation: sapFadeIn 0.2s ease;
}
@keyframes sapFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.sap-msg-bot {
  background: rgba(0,200,232,0.08);
  border: 1px solid rgba(0,200,232,0.15);
  color: #c8e8ff;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.sap-msg-user {
  background: linear-gradient(135deg, #00c8e8, #0090b8);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.sap-typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 10px 14px;
  background: rgba(0,200,232,0.08);
  border: 1px solid rgba(0,200,232,0.15);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
}
.sap-typing span {
  width: 7px;
  height: 7px;
  background: #00c8e8;
  border-radius: 50%;
  animation: sapBounce 1.2s infinite;
}
.sap-typing span:nth-child(2) { animation-delay: 0.2s; }
.sap-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes sapBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.sap-chat-suggestions {
  padding: 0 16px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.sap-suggestion {
  background: rgba(0,200,232,0.08);
  border: 1px solid rgba(0,200,232,0.25);
  color: #00c8e8;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.sap-suggestion:hover {
  background: rgba(0,200,232,0.18);
  border-color: rgba(0,200,232,0.5);
}
.sap-chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid rgba(0,200,232,0.1);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
#sap-chat-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(0,200,232,0.2);
  border-radius: 10px;
  padding: 9px 12px;
  color: #e2eaf8;
  font-size: 13.5px;
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 100px;
  line-height: 1.4;
  font-family: inherit;
  transition: border-color 0.2s;
}
#sap-chat-input:focus { border-color: rgba(0,200,232,0.5); }
#sap-chat-input::placeholder { color: rgba(200,220,255,0.35); }
#sap-chat-send {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, #00c8e8, #0090b8);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.2s;
}
#sap-chat-send:hover { opacity: 0.85; transform: scale(1.05); }
#sap-chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.sap-chat-footer {
  text-align: center;
  font-size: 10px;
  color: rgba(200,220,255,0.25);
  padding: 0 16px 10px;
}
@media (max-width: 420px) {
  #sap-chat-window { width: calc(100vw - 24px); right: 12px; bottom: 80px; }
  #sap-chat-btn { right: 12px; bottom: 12px; }
}
</style>

<!-- Chat Button -->
<button id="sap-chat-btn" onclick="sapToggleChat()" title="Chat with SuperAdPro AI">
  <div id="sap-chat-badge"></div>
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
  </svg>
</button>

<!-- Chat Window -->
<div id="sap-chat-window">
  <div class="sap-chat-header">
    <div class="sap-chat-header-avatar">▶</div>
    <div class="sap-chat-header-info">
      <div class="sap-chat-header-name">SuperAdPro Assistant</div>
      <div class="sap-chat-header-status">
        <span class="sap-status-dot"></span> Online — Ask me anything
      </div>
    </div>
    <button class="sap-chat-close" onclick="sapToggleChat()">✕</button>
  </div>

  <div class="sap-chat-messages" id="sap-messages"></div>

  <div class="sap-chat-suggestions" id="sap-suggestions">
    <button class="sap-suggestion" onclick="sapSuggest('What is SuperAdPro?')">What is SuperAdPro?</button>
    <button class="sap-suggestion" onclick="sapSuggest('How do I get started?')">How do I get started?</button>
    <button class="sap-suggestion" onclick="sapSuggest('How do commissions work?')">How do commissions work?</button>
    <button class="sap-suggestion" onclick="sapSuggest('What tools are included?')">What tools are included?</button>
  </div>

  <div class="sap-chat-input-area">
    <textarea id="sap-chat-input" placeholder="Ask me anything about SuperAdPro..." rows="1" onkeydown="sapKeyDown(event)" oninput="sapAutoResize(this)"></textarea>
    <button id="sap-chat-send" onclick="sapSend()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="sap-chat-footer">Powered by SuperAdPro AI</div>
</div>

<script>
var sapOpen = false;
var sapHistory = [];
var sapWelcomed = false;

function sapToggleChat() {
  sapOpen = !sapOpen;
  var win = document.getElementById('sap-chat-window');
  var badge = document.getElementById('sap-chat-badge');
  if (sapOpen) {
    win.classList.add('open');
    badge.style.display = 'none';
    if (!sapWelcomed) {
      sapWelcomed = true;
      setTimeout(function() {
        sapAddMsg('bot', "👋 Hi! I'm the SuperAdPro AI assistant. I can answer questions about our platform, membership packages, tools, commissions and more. How can I help you today?");
      }, 300);
    }
    setTimeout(function() { document.getElementById('sap-chat-input').focus(); }, 400);
  } else {
    win.classList.remove('open');
  }
}

function sapAddMsg(type, text) {
  var msgs = document.getElementById('sap-messages');
  var div = document.createElement('div');
  div.className = 'sap-msg sap-msg-' + type;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function sapShowTyping() {
  var msgs = document.getElementById('sap-messages');
  var div = document.createElement('div');
  div.className = 'sap-typing';
  div.id = 'sap-typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sapHideTyping() {
  var el = document.getElementById('sap-typing-indicator');
  if (el) el.remove();
}

function sapHideSuggestions() {
  document.getElementById('sap-suggestions').style.display = 'none';
}

function sapSuggest(text) {
  document.getElementById('sap-chat-input').value = text;
  sapSend();
}

function sapKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sapSend();
  }
}

function sapAutoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sapSend() {
  var input = document.getElementById('sap-chat-input');
  var text = input.value.trim();
  if (!text) return;

  sapHideSuggestions();
  sapAddMsg('user', text);
  sapHistory.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  var sendBtn = document.getElementById('sap-chat-send');
  sendBtn.disabled = true;
  sapShowTyping();

  try {
    var res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: sapHistory })
    });
    var data = await res.json();
    sapHideTyping();

    var reply = data.reply || "I'm sorry, I couldn't process that. Please try again.";
    sapAddMsg('bot', reply);
    sapHistory.push({ role: 'assistant', content: reply });

    // Keep history to last 10 exchanges to manage cost
    if (sapHistory.length > 20) sapHistory = sapHistory.slice(-20);

  } catch (err) {
    sapHideTyping();
    sapAddMsg('bot', "Sorry, I'm having trouble connecting right now. Please try again in a moment.");
  }

  sendBtn.disabled = false;
  document.getElementById('sap-chat-input').focus();
}

// Show badge after 8 seconds if chat hasn't been opened
setTimeout(function() {
  if (!sapOpen) {
    document.getElementById('sap-chat-badge').style.display = 'block';
  }
}, 8000);
</script>
