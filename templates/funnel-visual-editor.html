<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Builder — {{ page.title }}</title>
<link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.13/dist/css/grapes.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--border:rgba(14,165,233,0.1);--blue:#0ea5e9;--blue-dim:rgba(14,165,233,0.08);--text:#e2e8f0;--text-dim:#64748b;--green:#10b981;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--bg);border-bottom:1px solid var(--border);position:relative;z-index:10}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-back{color:var(--text-dim);font-size:12px;font-weight:600;text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid rgba(148,163,184,0.12);display:flex;align-items:center;gap:4px}
.tb-back:hover{color:#38bdf8;border-color:rgba(56,189,248,0.25)}
.tb-logo{font-family:Sora;font-weight:800;font-size:14px;color:#fff}
.tb-logo span{color:#38bdf8}
.tb-sep{width:1px;height:20px;background:var(--border)}
.tb-center{display:flex;align-items:center;gap:8px}
.tb-input{background:var(--blue-dim);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:500;font-family:inherit;padding:5px 12px;width:200px}
.tb-input:focus{outline:none;border-color:rgba(14,165,233,0.4)}
.tb-status{font-size:10px;color:var(--text-dim);min-width:80px;text-align:center}
.tb-right{display:flex;align-items:center;gap:6px}
.tb-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
.btn-device{background:var(--blue-dim);color:var(--text-dim);border:1px solid var(--border);font-size:14px;padding:5px 8px}
.btn-device:hover,.btn-device.active{color:#38bdf8;border-color:rgba(14,165,233,0.3)}
.btn-preview{background:var(--blue-dim);color:var(--text-dim);border:1px solid var(--border)}
.btn-preview:hover{color:#38bdf8;border-color:rgba(14,165,233,0.3)}
.btn-save{background:linear-gradient(135deg,#059669,var(--green));color:#fff}
.btn-save:hover{box-shadow:0 2px 12px rgba(16,185,129,0.3)}
.btn-publish{background:linear-gradient(135deg,#0284c7,var(--blue));color:#fff}
.btn-publish:hover{box-shadow:0 2px 12px rgba(14,165,233,0.3)}
.btn-template{background:rgba(168,85,247,0.1);color:#a78bfa;border:1px solid rgba(168,85,247,0.2)}
.btn-template:hover{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.35)}

/* ── GrapesJS Overrides — SuperAdPro Dark Theme ── */
.gjs-one-bg{background:var(--surface)!important}
.gjs-two-color{color:var(--text)!important}
.gjs-three-bg{background:var(--blue)!important}
.gjs-four-color,.gjs-four-color-h:hover{color:#38bdf8!important}
.gjs-pn-panel{background:var(--surface)!important;border-color:var(--border)!important}
.gjs-pn-views,.gjs-pn-views-container{background:var(--surface)!important}
.gjs-block{background:rgba(14,165,233,0.06)!important;border:1px solid rgba(14,165,233,0.12)!important;border-radius:8px!important;color:var(--text)!important;min-height:60px!important;transition:all 0.15s!important}
.gjs-block:hover{background:rgba(14,165,233,0.12)!important;border-color:rgba(14,165,233,0.25)!important;box-shadow:0 2px 8px rgba(14,165,233,0.15)!important}
.gjs-block__media{color:#38bdf8!important}
.gjs-block-label{font-family:'DM Sans'!important;font-size:11px!important;font-weight:600!important}
.gjs-category-title,.gjs-layer-title,.gjs-sm-sector-title{font-family:'DM Sans'!important;font-weight:700!important;color:var(--text)!important;background:rgba(14,165,233,0.04)!important;border-color:var(--border)!important}
.gjs-clm-tags .gjs-input{background:var(--bg)!important;border-color:var(--border)!important;color:var(--text)!important}
.gjs-field{background:var(--bg)!important;border-color:var(--border)!important;color:var(--text)!important;border-radius:4px!important}
.gjs-field input,.gjs-field select,.gjs-field textarea{color:var(--text)!important}
.gjs-radio-item{border-color:var(--border)!important}
.gjs-radio-item:checked,.gjs-radio-item.active{background:var(--blue)!important}
.gjs-sm-label{color:var(--text-dim)!important;font-size:11px!important}
.gjs-toolbar{background:var(--blue)!important;border-radius:6px!important}
.gjs-resizer-h{border-color:var(--blue)!important}

/* Editor area height */
.editor-wrap{display:flex;flex-direction:column;height:calc(100vh - 52px)}
#gjs{flex:1;overflow:hidden}

/* Template picker modal */
.tpl-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.tpl-overlay.show{display:flex}
.tpl-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:800px;width:90%;max-height:80vh;overflow-y:auto;padding:28px}
.tpl-title{font-family:Sora;font-size:20px;font-weight:800;margin-bottom:4px}
.tpl-sub{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:700px){.tpl-grid{grid-template-columns:1fr 1fr}}
.tpl-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;background:var(--bg)}
.tpl-card:hover{border-color:rgba(14,165,233,0.35);box-shadow:0 4px 16px rgba(14,165,233,0.15);transform:translateY(-2px)}
.tpl-thumb{height:120px;background:#1a2035;display:flex;align-items:center;justify-content:center;font-size:36px}
.tpl-info{padding:12px}
.tpl-name{font-size:13px;font-weight:700;margin-bottom:2px}
.tpl-desc{font-size:10px;color:var(--text-dim)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;transition:transform 0.3s ease,opacity 0.3s;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:#10b981;color:#fff}
.toast.error{background:#ef4444;color:#fff}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <a href="/funnels" class="tb-back">← Pages</a>
    <div class="tb-sep"></div>
    <div class="tb-logo">Super<span>Ad</span>Pro</div>
    <div class="tb-sep"></div>
    <span style="font-family:Sora;font-size:12px;font-weight:700;color:#38bdf8">Page Builder</span>
  </div>
  <div class="tb-center">
    <input class="tb-input" type="text" id="pageName" value="{{ page.title }}" placeholder="Page name...">
    <div class="tb-status" id="saveStatus">Ready</div>
  </div>
  <div class="tb-right">
    <button class="tb-btn btn-template" onclick="showTemplates()">📋 Templates</button>
    <div class="tb-sep"></div>
    <button class="tb-btn btn-device" id="devDesktop" onclick="setDevice('Desktop')" title="Desktop">🖥</button>
    <button class="tb-btn btn-device" id="devTablet" onclick="setDevice('Tablet')" title="Tablet">📱</button>
    <button class="tb-btn btn-device" id="devMobile" onclick="setDevice('Mobile')" title="Mobile">📲</button>
    <div class="tb-sep"></div>
    <button class="tb-btn btn-preview" onclick="togglePreview()">👁 Preview</button>
    <button class="tb-btn btn-save" onclick="savePage('draft')">💾 Save</button>
    <button class="tb-btn btn-publish" onclick="savePage('published')">🚀 Publish</button>
  </div>
</div>

<!-- EDITOR -->
<div class="editor-wrap">
  <div id="gjs"></div>
</div>

<!-- TEMPLATE PICKER -->
<div class="tpl-overlay" id="tplOverlay" onclick="if(event.target===this)hideTemplates()">
  <div class="tpl-modal">
    <div class="tpl-title">Choose a Template</div>
    <div class="tpl-sub">Start with a pre-built design and customise it to match your brand.</div>
    <div class="tpl-grid" id="tplGrid"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ═══ FUNCTIONS ═══
const PAGE_ID = {{ page.id }};
let currentStatus = '{{ page.status }}';
let lastSavedAt = null;

function setDevice(name) {
  editor.setDevice(name);
  document.querySelectorAll('.btn-device').forEach(b => b.classList.remove('active'));
  document.getElementById('dev'+name.replace(/\s/g,'')).classList.add('active');
}

function togglePreview() {
  editor.runCommand('preview');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showTemplates() {
  const grid = document.getElementById('tplGrid');
  grid.innerHTML = Object.entries(TEMPLATES).map(([key, tpl]) =>
    `<div class="tpl-card" onclick="loadTemplate('${key}')">
      <div class="tpl-thumb">${tpl.icon}</div>
      <div class="tpl-info"><div class="tpl-name">${tpl.name}</div><div class="tpl-desc">${tpl.desc}</div></div>
    </div>`
  ).join('');
  document.getElementById('tplOverlay').classList.add('show');
}

function hideTemplates() {
  document.getElementById('tplOverlay').classList.remove('show');
}

function loadTemplate(key) {
  const tpl = TEMPLATES[key];
  if (!tpl) return;
  if (editor.getComponents().length > 0) {
    if (!confirm('This will replace your current content. Continue?')) return;
  }
  editor.setComponents(tpl.html);
  editor.setStyle(tpl.css || '');
  hideTemplates();
  showToast('Template loaded — customise it!', 'success');
}

async function savePage(status) {
  const st = document.getElementById('saveStatus');
  st.textContent = 'Saving...';
  st.style.color = '#f59e0b';

  const payload = {
    id: PAGE_ID,
    title: document.getElementById('pageName').value || 'Untitled Page',
    status: status || currentStatus,
    template_type: 'visual',
    gjs_components: JSON.stringify(editor.getComponents()),
    gjs_styles: JSON.stringify(editor.getStyle()),
    gjs_html: editor.getHtml(),
    gjs_css: editor.getCss(),
    updated_at: lastSavedAt
  };

  try {
    const resp = await fetch('/api/funnels/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    if (resp.ok) {
      currentStatus = status;
      lastSavedAt = data.updated_at;
      st.textContent = status === 'published' ? '🟢 Published' : '✓ Saved';
      st.style.color = '#10b981';
      showToast(status === 'published' ? 'Page published!' : 'Page saved', 'success');
    } else {
      st.textContent = '⚠ Error';
      st.style.color = '#ef4444';
      showToast(data.error || 'Save failed', 'error');
    }
  } catch (e) {
    st.textContent = '⚠ Error';
    st.style.color = '#ef4444';
    showToast('Network error — check your connection', 'error');
  }
}

// ═══ LOAD EXISTING PAGE ═══
async function loadPage() {
  try {
    const resp = await fetch('/api/funnels/load/'+PAGE_ID);
    const data = await resp.json();
    if (data.gjs_components && typeof data.gjs_components === 'string') {
      try {
        editor.setComponents(JSON.parse(data.gjs_components));
        editor.setStyle(JSON.parse(data.gjs_styles || '[]'));
      } catch(e) {
        // Fallback: load raw HTML
        if (data.gjs_html) {
          editor.setComponents(data.gjs_html);
          editor.setStyle(data.gjs_css || '');
        }
      }
    } else if (data.gjs_html) {
      editor.setComponents(data.gjs_html);
      editor.setStyle(data.gjs_css || '');
    }
    if (data.title) document.getElementById('pageName').value = data.title;
    if (data.updated_at) lastSavedAt = data.updated_at;
    currentStatus = data.status || 'draft';
  } catch(e) {
    // New page — show template picker
    setTimeout(showTemplates, 500);
  }
}

// ═══ KEYBOARD SHORTCUTS ═══
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    savePage(currentStatus);
  }
});

// ═══ AUTO-SAVE every 60 seconds ═══
setInterval(function() {
  if (editor.getDirtyCount() > 0) {
    savePage(currentStatus);
  }
}, 60000);

// Init
setDevice('Desktop');
loadPage();
</script>
