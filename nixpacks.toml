[phases.setup]
# Backups do NOT need pg_dump anymore: app/db_backup.py (29 Jun 2026)
# does a pure-Python logical dump straight to R2 — version-agnostic,
# no postgres client binary required. Do not re-add postgresql here
# for backup reasons.
nixPkgs = ['...', 'ffmpeg']

[phases.build]
cmds = ["python -m compileall -q app/"]
