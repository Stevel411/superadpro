# Tried adding 'postgresql_17' here but it failed Railway's nixpacks
# build (27 May 2026) — package name doesn't resolve in the nixpkgs
# revision Railway uses. Need to find the correct package name. In the
# meantime the daily backup will keep failing with 'command not found'.
